# Comprehensive Metabolic Panel — additional tests beyond BMP
# Sources: ARUP Laboratories, UpToDate gastroenterology/hepatology

- loinc_code: "1751-7"
  test_name: "Albumin"
  unit: "g/dL"
  reference_ranges:
    - population: "adult"
      age_min: 18
      age_max: 120
      sex: "any"
      low: 3.5
      high: 5.0
      source: "ARUP Laboratories — adult serum albumin"
  severity_bands:
    normal: { low: 3.5, high: 5.0 }
    mild_low: { low: 2.8, high: 3.4 }
    mild_high: { low: 5.1, high: 5.5 }
    moderate_low: { low: 2.0, high: 2.7 }
    moderate_high: { low: 5.6, high: 6.5 }
    critical_low: { low: 0, high: 1.9 }
    critical_high: { low: 6.6, high: 999 }
  actionability:
    normal: "routine"
    mild_low: "monitor"
    mild_high: "monitor"
    moderate_low: "consult"
    moderate_high: "consult"
    critical_low: "urgent"
    critical_high: "urgent"

