# Complete Blood Count (CBC) — interpretation rules
# Sources: WHO guidelines, ARUP Laboratories, UpToDate hematology references

- loinc_code: "6690-2"
  test_name: "Leukocytes (WBC)"
  unit: "K/uL"
  reference_ranges:
    - population: "adult"
      age_min: 18
      age_max: 120
      sex: "any"
      low: 4.5
      high: 11.0
      source: "ARUP Laboratories — adult reference range"
  severity_bands:
    normal: { low: 4.5, high: 11.0 }
    mild_low: { low: 3.5, high: 4.4 }
    mild_high: { low: 11.1, high: 15.0 }
    moderate_low: { low: 1.0, high: 3.4 }
    moderate_high: { low: 15.1, high: 30.0 }
    critical_low: { low: 0, high: 0.9 }
    critical_high: { low: 30.1, high: 999 }
  actionability:
    normal: "routine"
    mild_low: "monitor"
    mild_high: "monitor"
    moderate_low: "consult"
    moderate_high: "consult"
    critical_low: "urgent"
    critical_high: "urgent"

