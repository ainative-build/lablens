# Thyroid Panel — interpretation rules
# Sources: ATA guidelines, ARUP Laboratories, UpToDate endocrinology

- loinc_code: "3016-3"
  test_name: "TSH (Thyroid Stimulating Hormone)"
  unit: "mIU/L"
  reference_ranges:
    - population: "adult"
      age_min: 18
      age_max: 120
      sex: "any"
      low: 0.4
      high: 4.0
      source: "ATA — adult TSH reference range"
  severity_bands:
    normal: { low: 0.4, high: 4.0 }
    mild_low: { low: 0.1, high: 0.39 }
    mild_high: { low: 4.1, high: 10.0 }
    moderate_low: { low: 0.01, high: 0.09 }
    moderate_high: { low: 10.1, high: 20.0 }
    critical_low: { low: 0, high: 0.009 }
    critical_high: { low: 20.1, high: 999 }
  actionability:
    normal: "routine"
    mild_low: "monitor"
    mild_high: "monitor"
    moderate_low: "consult"
    moderate_high: "consult"
    critical_low: "urgent"
    critical_high: "urgent"

- loinc_code: "3024-7"
  test_name: "Free T4 (Thyroxine)"
  unit: "ng/dL"
  reference_ranges:
    - population: "adult"
      age_min: 18
      age_max: 120
      sex: "any"
      low: 0.8
      high: 1.8
      source: "ARUP Laboratories — adult free T4"
  severity_bands:
    normal: { low: 0.8, high: 1.8 }
    mild_low: { low: 0.5, high: 0.79 }
    mild_high: { low: 1.81, high: 2.5 }
    moderate_low: { low: 0.2, high: 0.49 }
    moderate_high: { low: 2.6, high: 5.0 }
    critical_low: { low: 0, high: 0.19 }
    critical_high: { low: 5.1, high: 999 }
  actionability:
    normal: "routine"
    mild_low: "monitor"
    mild_high: "monitor"
    moderate_low: "consult"
    moderate_high: "consult"
    critical_low: "urgent"
    critical_high: "urgent"

