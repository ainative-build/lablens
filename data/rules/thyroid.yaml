    normal: { low: 4.5, high: 12.0 }
    mild_low: { low: 3.0, high: 4.4 }
    mild_high: { low: 12.1, high: 15.0 }
    moderate_low: { low: 1.0, high: 2.9 }
    moderate_high: { low: 15.1, high: 25.0 }
    critical_low: { low: 0, high: 0.9 }
    critical_high: { low: 25.1, high: 999 }
  actionability:
    normal: "routine"
    mild_low: "monitor"
    mild_high: "monitor"
    moderate_low: "consult"
    moderate_high: "consult"
    critical_low: "urgent"
    critical_high: "urgent"
