# Kidney Panel — interpretation rules
# Sources: KDIGO guidelines, ARUP Laboratories, UpToDate nephrology
# Note: Creatinine and BUN are in bmp.yaml; this covers additional kidney markers

- loinc_code: "33914-3"
  test_name: "eGFR (Estimated Glomerular Filtration Rate)"
  unit: "mL/min/1.73m2"
  reference_ranges:
    - population: "adult"
      age_min: 18
      age_max: 120
      sex: "any"
      low: 90
      high: 999
      source: "KDIGO 2012 — normal kidney function ≥90"
  severity_bands:
    normal: { low: 90, high: 999 }
    mild_low: { low: 60, high: 89 }
    moderate_low: { low: 30, high: 59 }
    critical_low: { low: 0, high: 29 }
  actionability:
    normal: "routine"
    mild_low: "monitor"
    moderate_low: "consult"
    critical_low: "urgent"

- loinc_code: "3084-1"
  test_name: "Uric Acid"
  unit: "mg/dL"
  reference_ranges:
    - population: "adult"
      age_min: 18
      age_max: 120
      sex: "male"
      low: 3.5
      high: 7.2
      source: "ARUP Laboratories — adult male uric acid"
    - population: "adult"
      age_min: 18
      age_max: 120
      sex: "female"
      low: 2.6
      high: 6.0
      source: "ARUP Laboratories — adult female uric acid"
  severity_bands:
    normal: { low: 2.6, high: 7.2 }
    mild_low: { low: 1.5, high: 2.5 }
    mild_high: { low: 7.3, high: 9.0 }
    moderate_low: { low: 0.5, high: 1.4 }
    moderate_high: { low: 9.1, high: 12.0 }
    critical_low: { low: 0, high: 0.4 }
    critical_high: { low: 12.1, high: 999 }
  actionability:
    normal: "routine"
    mild_low: "monitor"
    mild_high: "monitor"
    moderate_low: "consult"
    moderate_high: "consult"
    critical_low: "urgent"
    critical_high: "urgent"

- loinc_code: "14959-1"
  test_name: "Microalbumin (Urine)"
  unit: "mg/L"
  reference_ranges:
    - population: "adult"
      age_min: 18
      age_max: 120
      sex: "any"
      low: 0
      high: 30
      source: "KDIGO — normal urine albumin"
  severity_bands:
    normal: { low: 0, high: 30 }
    mild_high: { low: 31, high: 300 }
    moderate_high: { low: 301, high: 1000 }
    critical_high: { low: 1001, high: 99999 }
  actionability:
    normal: "routine"
    mild_high: "monitor"
    moderate_high: "consult"
    critical_high: "urgent"

- loinc_code: "2777-1"
  test_name: "Phosphate"
  unit: "mg/dL"
  reference_ranges:
    - population: "adult"
      age_min: 18
      age_max: 120
      sex: "any"
      low: 2.5
      high: 4.5
      source: "ARUP Laboratories — adult serum phosphate"
  severity_bands:
    normal: { low: 2.5, high: 4.5 }
    mild_low: { low: 1.8, high: 2.4 }
    mild_high: { low: 4.6, high: 5.5 }
    moderate_low: { low: 1.0, high: 1.7 }
    moderate_high: { low: 5.6, high: 7.0 }
    critical_low: { low: 0, high: 0.9 }
    critical_high: { low: 7.1, high: 999 }
  actionability:
    normal: "routine"
    mild_low: "monitor"
    mild_high: "monitor"
    moderate_low: "consult"
    moderate_high: "consult"
    critical_low: "urgent"
    critical_high: "urgent"

- loinc_code: "19123-9"
  test_name: "Magnesium"
  unit: "mg/dL"
  reference_ranges:
    - population: "adult"
      age_min: 18
      age_max: 120
      sex: "any"
      low: 1.7
      high: 2.2
      source: "ARUP Laboratories — adult serum magnesium"
  severity_bands:
    normal: { low: 1.7, high: 2.2 }
    mild_low: { low: 1.4, high: 1.6 }
    mild_high: { low: 2.3, high: 2.6 }
    moderate_low: { low: 1.0, high: 1.3 }
    moderate_high: { low: 2.7, high: 4.0 }
    critical_low: { low: 0, high: 0.9 }
    critical_high: { low: 4.1, high: 999 }
  actionability:
    normal: "routine"
    mild_low: "monitor"
    mild_high: "monitor"
    moderate_low: "consult"
    moderate_high: "consult"
    critical_low: "urgent"
    critical_high: "urgent"
