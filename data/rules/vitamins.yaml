  severity_bands:
    normal: { low: 200, high: 900 }
    mild_low: { low: 150, high: 199 }
    moderate_low: { low: 100, high: 149 }
    critical_low: { low: 0, high: 99 }
    mild_high: { low: 901, high: 2000 }
  actionability:
    normal: "routine"
    mild_low: "monitor"
    moderate_low: "consult"
    critical_low: "urgent"
    mild_high: "monitor"

