# Vitamins Panel — interpretation rules
# Sources: Endocrine Society 2011, ARUP Laboratories
# Note: Vitamin D uses ng/mL as canonical unit (US standard)

- loinc_code: "1989-3"
  test_name: "25-Hydroxyvitamin D"
  unit: "ng/mL"
  reference_ranges:
    - population: "adult"
      age_min: 18
      age_max: 120
      sex: "any"
      low: 30
      high: 100
      source: "Endocrine Society 2011 — sufficient ≥30 ng/mL"
  severity_bands:
    normal: { low: 30, high: 100 }
    mild_low: { low: 20, high: 29 }
    moderate_low: { low: 12, high: 19 }
    critical_low: { low: 0, high: 11 }
    mild_high: { low: 101, high: 150 }
    critical_high: { low: 151, high: 999 }
  actionability:
    normal: "routine"
    mild_low: "monitor"
    moderate_low: "consult"
    critical_low: "urgent"
    mild_high: "monitor"
    critical_high: "urgent"

