# Basic Metabolic Panel (BMP) — interpretation rules
# Sources: ADA guidelines, ARUP Laboratories, KDIGO, UpToDate

- loinc_code: "2345-7"
  test_name: "Glucose"
  unit: "mg/dL"
  reference_ranges:
    - population: "adult"
      age_min: 18
      age_max: 120
      sex: "any"
      low: 70
      high: 100
      source: "ADA — fasting plasma glucose"
  severity_bands:
    normal: { low: 70, high: 100 }
    mild_low: { low: 54, high: 69 }
    mild_high: { low: 101, high: 125 }
    moderate_low: { low: 40, high: 53 }
    moderate_high: { low: 126, high: 250 }
    critical_low: { low: 0, high: 39 }
    critical_high: { low: 251, high: 9999 }
  actionability:
    normal: "routine"
    mild_low: "monitor"
    mild_high: "monitor"
    moderate_low: "consult"
    moderate_high: "consult"
    critical_low: "urgent"
    critical_high: "urgent"

