# Production compose stack — backend + frontend + nginx.
# Run from repo root: `docker compose -f docker/docker-compose.prod.yml up -d --build`
#
# Architecture: Nginx terminates TLS, fronts both services. Backend + frontend
# are NOT directly exposed (only Nginx publishes 80/443).
#
# Cert files expected at /etc/lablens/certs/{lablens.pem,lablens.key} on the
# host (placed there during Phase 2 provisioning via `aliyun cas` + scp).

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env.production
    expose:
      - "8000"
    # No `ports:` block — nginx fronts everything.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        # NEXT_PUBLIC_API_URL is baked at build time. Same-origin via Nginx
        # so frontend talks to backend through https://lablens.ainative.build.
        NEXT_PUBLIC_API_URL: https://lablens.ainative.build
    restart: unless-stopped
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/lablens/certs:/etc/nginx/certs:ro
