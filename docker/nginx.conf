# Nginx reverse proxy — TLS termination + route map for LabLens prod.
#
# Routing rules:
#   /api/*           → backend:8000  (incl. /api/health, /api/chat)
#   /analyze-report  → backend:8000  (legacy unprefixed upload route)
#   /analysis/*      → backend:8000  (legacy unprefixed poll/export routes)
#   /*               → frontend:3000 (Next.js)
#
# Long timeouts: OCR jobs run 3-4 min. Frontend polls async, but the upload
# request itself is short. Keep generous read timeouts to be safe.

worker_processes auto;
events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  client_max_body_size 25M;       # PDF uploads (max ~10 MB but headroom)
  keepalive_timeout 65;

  # Gzip text responses (Next.js serves pre-compressed assets but JSON benefits)
  gzip on;
  gzip_types text/plain application/json application/javascript text/css text/xml;

  # ── HTTP → HTTPS redirect ───────────────────────────────────────────────
  server {
    listen 80;
    server_name lablens.ainative.build;
    return 301 https://$host$request_uri;
  }

  # ── HTTPS main ──────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    http2 on;
    server_name lablens.ainative.build;

    ssl_certificate     /etc/nginx/certs/lablens.pem;
    ssl_certificate_key /etc/nginx/certs/lablens.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Generous timeouts for OCR-bound endpoints
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 30s;

    # Standard proxy headers (reused via include in each location below)
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # ── Backend routes ────────────────────────────────────────────────────
    # /api/* covers the new chat + health endpoints.
    location /api/ {
      proxy_pass http://backend:8000;
    }

    # Legacy unprefixed routes (analyze + analysis poll/export). Kept as-is
    # so existing frontend code paths and test smoke calls don't break.
    location /analyze-report {
      proxy_pass http://backend:8000;
    }

    location /analysis/ {
      proxy_pass http://backend:8000;
    }

    # ── Frontend (Next.js) catch-all ──────────────────────────────────────
    location / {
      proxy_pass http://frontend:3000;
      # Next.js HMR / WebSocket support (harmless in prod, useful for previews)
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
